# Home Assistant Add-on manifest.
# Ref: https://developers.home-assistant.io/docs/add-ons/configuration/
name: "CAI Bootstrap"
version: "0.1.9"
slug: "cai_bootstrap"
description: "Conectează acest Raspberry Pi la contul tău Smart-IoT. La pornire se înregistrează singur la cluster, te conduce printr-un wizard de 3 pași (cod claim → confirmare contul tău → gata) și apoi rulează în fundal trimițând doar status checks. Click 'Open Web UI' după install ca să începi."
url: "https://www.caitech.ro"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
# host_network DISABLED — conflicted with ingress on port 8099, causing
# duplicate addon container processes (s6 + ingress proxy both binding).
# Trade-off: zeroconf/mDNS scan in Phase 6 sees only the container netns;
# Solarman UDP probe still works (broadcast). v1.0 accepts this tradeoff;
# revisit if more discovery types need true LAN visibility.
host_dbus: true
full_access: true
homeassistant_api: true
hassio_api: true
hassio_role: admin
map:
  - "config:rw"
  - "ssl:rw"
  - "addons"
  - "backup"
# Phase 7-b: expose the pairing UI as an HA sidebar panel.
# The addon serves an aiohttp app on `ingress_port`, HA proxies it under
# /hassio/ingress/<addon_slug>/. Users see "Pair Device" in their sidebar.
ingress: true
ingress_port: 8099
panel_icon: "mdi:account-key"
panel_title: "Pair Device"
panel_admin: false
options:
  cluster_url: "https://smart-iot.caitech.ro"
  heartbeat_interval_sec: 300
  log_level: "info"
  # Factory-provisioned items (populated by the build pipeline via config
  # override or hassos.img injection; empty in the default distribution).
  serial: ""
  bootstrap_token: ""
  fallback_api_key: ""
schema:
  cluster_url: "url"
  heartbeat_interval_sec: "int(60,86400)"
  log_level: "list(debug|info|warning|error)"
  serial: "str?"
  bootstrap_token: "str?"
  fallback_api_key: "password?"
image: "registry.smart-iot.caitech.ro/cai-bootstrap-{arch}"
