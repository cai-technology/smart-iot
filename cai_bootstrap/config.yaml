name: "CAI Bootstrap"
version: "0.1.7"
slug: "cai_bootstrap"
description: "CAI Technology device onboarding agent. Connects your device to your CAI account."
url: "https://www.caitech.ro"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
host_dbus: true
full_access: true
homeassistant_api: true
hassio_api: true
hassio_role: admin
map:
  - "config:rw"
  - "ssl:rw"
  - "addons"
  - "backup"
ingress: true
ingress_port: 8099
panel_icon: "mdi:account-key"
panel_title: "Pair Device"
panel_admin: false
options:
  cluster_url: "https://smart-iot.caitech.ro"
  heartbeat_interval_sec: 300
  log_level: "info"
  serial: ""
  bootstrap_token: ""
  fallback_api_key: ""
schema:
  cluster_url: "url"
  heartbeat_interval_sec: "int(60,86400)"
  log_level: "list(debug|info|warning|error)"
  serial: "str?"
  bootstrap_token: "str?"
  fallback_api_key: "password?"
image: "registry.smart-iot.caitech.ro/cai-bootstrap-{arch}"
